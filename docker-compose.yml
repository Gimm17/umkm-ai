version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umkm-ai-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8000}:8000'
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-umkm_ai}
      - DB_USERNAME=${DB_USERNAME:-umkmai}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - BROADCAST_CONNECTION=pusher
      - PUSHER_HOST=soketi
      - PUSHER_PORT=6001
      - PUSHER_APP_ID=${PUSHER_APP_ID:-umkm-ai}
      - PUSHER_APP_KEY=${PUSHER_APP_KEY:-umkm-ai-key}
      - PUSHER_APP_SECRET=${PUSHER_APP_SECRET:-umkm-ai-secret}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - INSTAGRAM_VERIFY_TOKEN=${INSTAGRAM_VERIFY_TOKEN}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - umkm-ai

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umkm-ai-worker
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-umkm_ai}
      - DB_USERNAME=${DB_USERNAME:-umkmai}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
    depends_on:
      - mysql
      - redis
    networks:
      - umkm-ai

  mysql:
    image: mysql:8.0
    container_name: umkm-ai-mysql
    restart: unless-stopped
    ports:
      - '${DB_PORT_EXPOSE:-3306}:3306'
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-umkm_ai}
      MYSQL_USER: ${DB_USERNAME:-umkmai}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umkm-ai

  redis:
    image: redis:7-alpine
    container_name: umkm-ai-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT_EXPOSE:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - umkm-ai

  soketi:
    image: 'quay.io/soketi/soketi:latest-16-alpine'
    container_name: umkm-ai-soketi
    restart: unless-stopped
    ports:
      - '${PUSHER_PORT:-6001}:6001'
      - '9601:9601'
    environment:
      SOKETI_APP_ID: '${PUSHER_APP_ID:-umkm-ai}'
      SOKETI_APP_KEY: '${PUSHER_APP_KEY:-umkm-ai-key}'
      SOKETI_APP_SECRET: '${PUSHER_APP_SECRET:-umkm-ai-secret}'
      SOKETI_DEBUG: '${SOKETI_DEBUG:-0}'
    networks:
      - umkm-ai

  nginx:
    image: nginx:alpine
    container_name: umkm-ai-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - umkm-ai

networks:
  umkm-ai:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
