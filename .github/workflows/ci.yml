name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    name: PHP Tests (Laravel)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, redis, pdo, pdo_sqlite, xml, curl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for testing
        run: |
          cp .env.example .env
          echo "APP_KEY=" >> .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Configure test environment
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "BROADCAST_CONNECTION=log" >> .env
          echo "ANTHROPIC_API_KEY=test_key_placeholder" >> .env
          echo "WHATSAPP_VERIFY_TOKEN=test_verify_token" >> .env
          echo "INSTAGRAM_VERIFY_TOKEN=test_verify_token" >> .env
          echo "WHATSAPP_APP_SECRET=test_secret" >> .env
          echo "INSTAGRAM_APP_SECRET=test_secret" >> .env
          echo "WEBHOOK_SKIP_VERIFY=true" >> .env

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --parallel

  lint-php:
    name: PHP Lint (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Laravel Pint
        run: ./vendor/bin/pint --test

  lint-js:
    name: JS Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [lint-js]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build
